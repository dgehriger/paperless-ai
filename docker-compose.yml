services:
  paperless-ai:
    image: clusterzx/paperless-ai
    container_name: paperless-ai
    network_mode: bridge
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges=true
    environment:
      - PUID=1000
      - PGID=1000
      - PAPERLESS_AI_PORT=${PAPERLESS_AI_PORT:-3000}
      - RAG_SERVICE_URL=http://localhost:8000
      - RAG_SERVICE_ENABLED=true
      # Authentication: 'local' (default, JWT login) or 'cf_access' (Cloudflare tunnel)
      - AUTH_MODE=${AUTH_MODE:-local}
      # Comma-separated emails auto-promoted to admin (cf_access mode only)
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      # Dev bypass: set to an email to auto-authenticate in dev (NEVER use in production)
      # - DEV_USER_EMAIL=
    ports:
      - "3000:${PAPERLESS_AI_PORT:-3000}"
    volumes:
      - paperless-ai_data:/app/data

volumes:
  paperless-ai_data:
